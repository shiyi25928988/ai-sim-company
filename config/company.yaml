ceo:
  agent_id: ceo-alex
  department: Executive
  name: Alex
  personality:
    agreeableness: 0.6
    conscientiousness: 0.9
    extraversion: 0.8
    neuroticism: 0.3
    openness: 0.85
  role: ceo
  salary: 0
company:
  business_description: 商业资讯公司，为个人创业者输出完整且严谨的市场调研报告
  initial_capital: 50000000000
  monthly_budget: 8000000
  name: Demo AI Co.
  workspace_dir: D:\data\workspace
llm:
  api_key: ${LLM_API_KEY}
  base_url: ${LLM_BASE_URL}
  claude_code_enabled: true
  daily_budget: ${LLM_DAILY_BUDGET}
  default_model: ${LLM_MODEL}
  enable_tools: ${LLM_TOOLS_ENABLED}
  max_iters: ${LLM_MAX_ITERS}
  mcp_servers:
  - args:
    - '@playwright/mcp@latest'
    command: npx
    name: playwright
    transport: stdio
  - args:
    - powerpoint-mcp
    command: uvx
    name: powerpoint
    transport: stdio
  provider: ${LLM_PROVIDER}
  routing: {}
simulation:
  agent_step_delay_ms: ${AGENT_STEP_DELAY_MS}
  agent_think_every: ${AGENT_THINK_EVERY}
  auto_start: ${SIM_AUTO_START}
  tick_interval_ms: ${TICK_INTERVAL_MS}
