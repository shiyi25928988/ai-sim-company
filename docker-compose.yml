# ai-sim-company 编排
# 两个固定容器 (redis + company + frontend) + 一个固定 Agent (ceo) + N 个动态 Agent
# 动态 Agent 由 Company Hub 通过 Docker API 创建/销毁，不写在此处。

services:
  # ═══════════════════════════════════════════
  # 消息骨干 + 状态存储 + Skill Pool
  # ═══════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: aisim-redis
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - aisim-net
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # Company Hub (后端 + 仿真 + Agent 编排 + LLM 网关)
  # ═══════════════════════════════════════════
  company:
    build:
      context: .
      dockerfile: Dockerfile.company
    container_name: aisim-company
    ports:
      - "8000:8000"           # FastAPI + WebSocket
    environment:
      - REDIS_URL=redis://redis:6379
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - TICK_INTERVAL_MS=${TICK_INTERVAL_MS:-5000}
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # 编排 Agent 容器
      - ./config:/app/config:ro
      - ./data:/app/data
      - company_workspace:/workspace/company
      - company_files:/workspace/shared              # 共享文件卷
    networks:
      - aisim-net
    depends_on:
      - redis
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # 前端 (Next.js + Phaser 3 像素风办公室)
  # ═══════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aisim-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - aisim-net
    depends_on:
      - company
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # CEO Agent (公司创立时即存在)
  # ═══════════════════════════════════════════
  agent-ceo:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: aisim-agent-ceo
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_ID=ceo-alex
    volumes:
      - agent_ceo_workspace:/workspace/ceo-alex
      - company_files:/workspace/shared       # 共享文件卷
    networks:
      - aisim-net
    depends_on:
      - redis
      - company
    restart: unless-stopped

volumes:
  redis_data:
  company_workspace:
  company_files:            # 共享文件卷 (所有 Agent 挂载)
  agent_ceo_workspace:
  # 其他 Agent 的 workspace 由 Company Hub 动态创建

networks:
  aisim-net:
    driver: bridge
